{% extends "admin/base.html" %}

{% block content %}
<div class="container-fluid mt-3">

    <!-- 🔹 Professional Header -->
    <div class="mb-4">
        <h3 style="font-weight:600; font-size:22px; margin-bottom:5px;">
            Dashboard Overview
        </h3>
        <p style="font-size:13px; color:#9ca3af; margin:0;">
            Quick summary of employees, attendance and tasks.
        </p>
    </div>

    <!-- 🔹 Compact Cards -->
    <div class="row g-3 mb-4">

        <!-- Total Employees -->
        <div class="col-lg-4 col-md-6 col-12">
            <a href="/admin/core/employee/" style="text-decoration:none;">
                <div class="card shadow-sm border-0 rounded-3 p-3"
                     style="min-height:95px; cursor:pointer;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div style="font-size:12px; color:#9ca3af;">
                                Total Employees
                            </div>
                            <div style="font-size:22px; font-weight:600;">
                                {{ card_total_employees }}
                            </div>
                        </div>

                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:38px;height:38px;background:#2b3a4a;">
                            <i class="fas fa-users text-white" style="font-size:14px;"></i>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Present Today -->
        <div class="col-lg-4 col-md-6 col-12">
            <a href="/admin/core/attendance/" style="text-decoration:none;">
                <div class="card shadow-sm border-0 rounded-3 p-3"
                     style="min-height:95px; cursor:pointer;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div style="font-size:12px; color:#9ca3af;">
                                Present Today
                            </div>
                            <div style="font-size:22px; font-weight:600; color:#00c389;">
                                {{ card_present_today }}
                            </div>
                        </div>

                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:38px;height:38px;background:#00a870;">
                            <i class="fas fa-user-check text-white" style="font-size:14px;"></i>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Tasks Completed -->
        <div class="col-lg-4 col-md-6 col-12">
            <a href="/admin/core/task/" style="text-decoration:none;">
                <div class="card shadow-sm border-0 rounded-3 p-3"
                     style="min-height:95px; cursor:pointer;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div style="font-size:12px; color:#9ca3af;">
                                Tasks Completed
                            </div>
                            <div style="font-size:22px; font-weight:600; color:#3aa0ff;">
                                {{ card_tasks_completed_today }}
                            </div>
                        </div>

                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:38px;height:38px;background:#2b89d8;">
                            <i class="fas fa-check-circle text-white" style="font-size:14px;"></i>
                        </div>
                    </div>
                </div>
            </a>
        </div>

    </div>

    <!-- 🔹 Default Admin Content BELOW cards -->
    {{ block.super }}

</div>
{% endblock %}
