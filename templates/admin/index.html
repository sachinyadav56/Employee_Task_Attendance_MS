{% extends "admin/base.html" %}

{% block content %}
<div class="container-fluid mt-3">

    <div class="row g-3">

        <!-- Total Employees -->
        <div class="col-lg-4 col-md-6 col-12">
            <a href="/admin/core/employee/" style="text-decoration:none;">
                <div class="card shadow-sm border-0 rounded-3 p-3"
                     style="min-height:120px; cursor:pointer;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="text-muted" style="font-size:14px;">
                                Total Employees
                            </div>
                            <div style="font-size:28px; font-weight:600;">
                                {{ card_total_employees }}
                            </div>
                        </div>

                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:45px;height:45px;background:#2b3a4a;">
                            <i class="fas fa-users text-white" style="font-size:16px;"></i>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Present Today -->
        <div class="col-lg-4 col-md-6 col-12">
            <a href="/admin/core/attendance/?date__exact={{ today_date }}" style="text-decoration:none;">
                <div class="card shadow-sm border-0 rounded-3 p-3"
                     style="min-height:120px; cursor:pointer;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="text-muted" style="font-size:14px;">
                                Present Today
                            </div>
                            <div style="font-size:28px; font-weight:600; color:#00c389;">
                                {{ card_present_today }}
                            </div>
                        </div>

                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:45px;height:45px;background:#00a870;">
                            <i class="fas fa-user-check text-white" style="font-size:16px;"></i>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Tasks Completed -->
        <div class="col-lg-4 col-md-6 col-12">
            <a href="/admin/core/task/?assigned_date__exact={{ today_date }}&is_completed__exact=1"
               style="text-decoration:none;">
                <div class="card shadow-sm border-0 rounded-3 p-3"
                     style="min-height:120px; cursor:pointer;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="text-muted" style="font-size:14px;">
                                Tasks Completed
                            </div>
                            <div style="font-size:28px; font-weight:600; color:#3aa0ff;">
                                {{ card_tasks_completed_today }}
                            </div>
                        </div>

                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:45px;height:45px;background:#2b89d8;">
                            <i class="fas fa-check-circle text-white" style="font-size:16px;"></i>
                        </div>
                    </div>
                </div>
            </a>
        </div>

    </div>
    <!-- Default Admin Content -->
    {{ block.super }}

</div>
{% endblock %}
