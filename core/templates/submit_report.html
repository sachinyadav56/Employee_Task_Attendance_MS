<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit IT Report | ETAMS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
--bg:#f5f7fb;
--surface:#ffffff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;
--primary:#4f46e5;
--shadow:0 8px 22px rgba(15,23,42,0.05);
--radius:12px;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
font-size:12px;
}

.page-wrap{
max-width:700px;
margin:auto;
padding:30px 16px;
}

.back-link{
display:inline-flex;
align-items:center;
gap:6px;
text-decoration:none;
color:var(--muted);
font-size:12px;
margin-bottom:8px;
}

.back-link:hover{
color:var(--primary);
}

.page-title{
font-size:20px;
font-weight:700;
margin-bottom:4px;
}

.subtext{
color:var(--muted);
font-size:12px;
margin-bottom:18px;
}

.form-card{
background:var(--surface);
border:1px solid var(--border);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:18px;
}

.form-label{
font-weight:600;
font-size:12px;
margin-bottom:5px;
}

.form-control,
.form-select{
border-radius:8px;
border:1px solid #dbe3ee;
font-size:12px;
padding:8px 10px;
}

.form-control:focus,
.form-select:focus{
border-color:var(--primary);
box-shadow:0 0 0 0.15rem rgba(79,70,229,0.08);
}

textarea{
resize:vertical;
min-height:120px;
}

.btn-modern{
border-radius:8px;
font-size:12px;
font-weight:600;
padding:8px 14px;
}

.toast-container{
    position: fixed;
    top: 25px;
    right: 25px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.toast-message{
    background: #16a34a;
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 250px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    animation: slideIn 0.4s ease;
}

.toast-message.error{
    background:#dc2626;
}

@keyframes slideIn{
    from{
        transform: translateX(100%);
        opacity:0;
    }
    to{
        transform: translateX(0);
        opacity:1;
    }
}

</style>
</head>
<script>
setTimeout(function(){
    document.querySelectorAll(".toast-message").forEach(function(msg){
        msg.style.opacity="0";
        msg.style.transform="translateX(100%)";
        setTimeout(()=>msg.remove(),500);
    });
},3000);
</script>
<body>

    {% if messages %}
<div class="toast-container">
    {% for message in messages %}
    <div class="toast-message {{ message.tags }}">
        <i class="bi bi-check-circle-fill"></i>
        <span>{{ message }}</span>
    </div>
    {% endfor %}
</div>
{% endif %}
<div class="page-wrap">

<a href="{% url 'employee_dashboard' %}" class="back-link">
<i class="bi bi-arrow-left"></i> Back to Dashboard
</a>

<div class="page-title">Submit Report</div>
<div class="subtext">Report technical issues so the IT team can resolve them quickly.</div>

<div class="form-card">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Issue Title</label>
<input type="text" name="title" class="form-control" placeholder="Example: Laptop not connecting to WiFi" required>
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Issue Type</label>
<select name="issue_type" class="form-select" required>
<option value="">Select Issue Type</option>
<option value="Software">Software</option>
<option value="Hardware">Hardware</option>
<option value="Login">Login</option>
<option value="Network">Network</option>
<option value="Other">Other</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Priority</label>
<select name="priority" class="form-select" required>
<option value="Low">Low</option>
<option value="Medium" selected>Medium</option>
<option value="High">High</option>
</select>
</div>

</div>

<div class="mb-4">
<label class="form-label">Description</label>
<textarea name="description" class="form-control" placeholder="Describe the issue clearly..." required></textarea>
</div>

<div class="d-flex gap-2">
<button class="btn btn-primary btn-modern">
<i class="bi bi-send-check"></i> Submit Report
</button>

<a href="{% url 'employee_dashboard' %}" class="btn btn-outline-secondary btn-modern">
Cancel
</a>
</div>

</form>

</div>

</div>

</body>
</html>
